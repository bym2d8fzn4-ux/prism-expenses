<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Expenses">
  <title>Expenses • PrismJet</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <header class="top-bar" aria-label="Expenses toolbar">
      <h1 class="top-title">Expenses</h1>
      <div class="home-menu">
        <button class="hamburger-button" id="menu-button" type="button" aria-label="Open menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="menu-popover" id="menu-popover" hidden>
          <button type="button" data-menu-action="import-backup"><span class="menu-icon import-backup-icon" aria-hidden="true"></span>Import Backup</button>
          <button type="button" data-menu-action="import-csv"><span class="menu-icon import-csv-icon" aria-hidden="true"></span>Import CSV File</button>
          <button type="button" data-menu-action="export-backup"><span class="menu-icon export-backup-icon" aria-hidden="true"></span>Export Backup</button>
          <button type="button" data-menu-action="export-csv"><span class="menu-icon export-csv-icon" aria-hidden="true"></span>Export CSV Report</button>
          <button type="button" data-menu-action="export-pdf"><span class="menu-icon export-pdf-icon" aria-hidden="true"></span>Export PDF Report</button>
          <hr class="menu-separator">
          <button type="button" data-menu-action="archive"><span class="menu-icon archive-icon" aria-hidden="true"></span>Archive</button>
          <button type="button" data-menu-action="categories"><span class="menu-icon category-icon" aria-hidden="true"></span>Categories</button>
          <button type="button" data-menu-action="aircraft"><span class="menu-icon aircraft-icon" aria-hidden="true"></span>Aircraft</button>
          <button type="button" data-menu-action="trips"><span class="menu-icon trip-icon" aria-hidden="true"></span>Trips</button>
          <button class="danger-menu-item" type="button" data-menu-action="clear"><span class="menu-icon clear-icon" aria-hidden="true"></span>Delete All Entries</button>
        </div>
      </div>
    </header>

    <header class="app-header card">
      <div class="hero-copy">
        <div class="brand-lockup">
          <div class="brand-logo-frame">
            <img class="brand-logo" src="assets/prismjet-logo.svg" alt="PrismJet">
          </div>
        </div>
        <a class="primary-button new-expense-link" id="new-entry-link" href="expense.html?type=expense">+ New</a>
      </div>
      <input id="import-input" type="file" accept=".json,application/json,.csv,text/csv" hidden>
    </header>

    <main class="layout compact-layout">
      <section class="ledger-toggle" aria-label="Record type">
        <button class="ledger-toggle-button active" data-record-type="expense" type="button" aria-pressed="true">Expenses</button>
        <button class="ledger-toggle-button" data-record-type="incentive" type="button" aria-pressed="false">Incentives</button>
      </section>

      <section class="status-grid" aria-label="Expense categories">
        <button class="status-tile card active" data-view="to-submit" type="button" aria-pressed="true">
          <span class="summary-label">Not Submitted</span>
          <span class="summary-value" id="summary-to-submit">$0.00</span>
          <span class="summary-meta" id="summary-to-submit-count">0 expenses</span>
        </button>

        <button class="status-tile card" data-view="submitted" type="button" aria-pressed="false">
          <span class="summary-label">Submitted</span>
          <span class="summary-value" id="summary-awaiting">$0.00</span>
          <span class="summary-meta" id="summary-awaiting-count">0 expenses</span>
        </button>

        <button class="status-tile card" data-view="reimbursed" type="button" aria-pressed="false">
          <span class="summary-label">Paid</span>
          <span class="summary-value" id="summary-reimbursed">$0.00</span>
          <span class="summary-meta" id="summary-reimbursed-count">0 expenses</span>
        </button>
      </section>

      <section class="grouping-grid" aria-label="Grouping options">
        <button class="grouping-button" data-grouping="trip" type="button">Trip</button>
        <button class="grouping-button active" data-grouping="week" type="button">Week</button>
        <button class="grouping-button" data-grouping="airport" type="button">Airport</button>
        <button class="grouping-button" data-grouping="aircraft" type="button">Aircraft</button>
        <button class="grouping-button" data-grouping="vendor" type="button">Vendor</button>
        <button class="grouping-button" data-grouping="category" type="button">Category</button>
      </section>

      <section class="list-panel">
        <div class="list-panel-heading">
          <div>
            <h2 id="list-heading">Not Submitted</h2>
            <p class="list-caption" id="list-caption">0 expenses • $0.00</p>
          </div>
        </div>

        <div class="expense-list" id="expense-list" aria-live="polite"></div>

        <template id="expense-card-template">
          <article class="expense-card">
            <div class="expense-card-top">
              <div class="expense-primary">
                <p class="expense-merchant"></p>
                <p class="expense-meta"></p>
              </div>
              <div class="expense-amount"></div>
            </div>

            <div class="expense-badges"></div>
            <p class="expense-location"></p>
            <p class="expense-notes"></p>
            <img class="expense-photo" alt="Receipt photo">

            <dl class="expense-timeline"></dl>

            <div class="expense-actions">
              <button class="inline-button" data-action="quick-status" type="button"></button>
              <button class="inline-button" data-action="edit" type="button">Edit</button>
              <button class="inline-button danger-inline" data-action="delete" type="button">Delete</button>
            </div>
          </article>
        </template>
      </section>
    </main>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
