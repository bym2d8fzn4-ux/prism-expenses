<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Expenses">
  <title>New Expense • Expenses • PrismJet</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell form-page native-editor-page">
    <header class="native-editor-toolbar" aria-label="Entry editor">
      <a class="native-toolbar-pill" id="back-link" href="index.html?view=to-submit">Cancel</a>
      <h1 id="form-title">New</h1>
      <button class="native-toolbar-pill" id="save-button" form="expense-form" type="submit">Save</button>
      <a id="cancel-link" href="index.html?view=to-submit" hidden>Cancel</a>
      <p id="form-eyebrow" hidden>PrismJet expense entry</p>
      <p id="form-copy" hidden>Snap the receipt, let OCR suggest the basics, then save.</p>
    </header>

    <form id="expense-form" class="native-editor-stack" novalidate>
        <input id="expense-id" type="hidden">
        <input id="existing-photo" type="hidden">

        <section class="native-editor-card native-file-card">
          <fieldset class="entry-type-picker native-segmented-picker">
            <legend>Entry type</legend>
            <label class="entry-type-option">
              <input id="record-type-expense" name="recordType" type="radio" value="expense" checked>
              <span>Expense</span>
            </label>
            <label class="entry-type-option">
              <input id="record-type-incentive" name="recordType" type="radio" value="incentive">
              <span>Incentive</span>
            </label>
          </fieldset>

          <label class="field field-wide receipt-field native-receipt-field">
            <span class="visually-hidden">Receipt photo</span>
            <span class="file-button-label" id="file-button-label">Choose File</span>
            <input id="photo" name="photo" type="file" accept="image/*,.pdf,application/pdf">
            <div class="receipt-actions">
              <button class="secondary-button compact-action" id="autofill-button" type="button" disabled hidden>Auto-Fill from Receipt</button>
              <p class="scan-status" id="scan-status">Choose a receipt photo to scan amount, vendor, category, and date.</p>
            </div>
          </label>

          <div class="photo-preview" id="photo-preview" hidden>
            <img id="photo-preview-image" alt="Receipt preview">
            <div class="photo-preview-actions">
              <button class="secondary-button compact-action" id="open-preview-button" type="button">Open Large Preview</button>
              <button class="inline-button danger-inline" id="remove-photo-button" type="button">Remove photo</button>
            </div>
          </div>
        </section>

        <section class="native-editor-card native-fields-card">
          <label class="field field-wide native-row">
            <span class="visually-hidden">Vendor</span>
            <input id="merchant" name="merchant" type="text" maxlength="80" placeholder="Vendor" required>
          </label>

          <label class="field field-wide native-row">
            <span class="visually-hidden">Amount</span>
            <input id="amount" name="amount" type="text" inputmode="numeric" autocomplete="off" placeholder="$0.00" required>
          </label>

          <label class="field field-wide native-row native-date-row">
            <span id="date-label">Expense date</span>
            <input id="date" name="date" type="date" required>
          </label>

          <label class="field field-wide native-row native-select-row">
            <span>Category</span>
            <select id="category" name="category" required>
              <option value="">Select category</option>
              <option value="Lodging">Lodging</option>
              <option value="Meal">Meal</option>
              <option value="Flight">Flight</option>
              <option value="Transport">Transport</option>
              <option value="Supplies">Supplies</option>
              <option value="Miscellaneous">Miscellaneous</option>
            </select>
          </label>

          <label class="field field-wide native-row native-select-row">
            <span>Trip</span>
            <select id="trip-number" name="tripNumber"></select>
          </label>

          <div class="native-add-row">
            <input id="new-trip-number" type="text" maxlength="40" placeholder="Add trip">
            <button id="add-trip-button" type="button">Add</button>
          </div>
        </section>

        <details class="native-editor-card details-panel native-details-card" id="optional-details" open>
          <summary>Airport</summary>
          <div class="field-grid optional-grid">
            <label class="field field-wide native-row">
              <span class="visually-hidden">Airport</span>
              <div class="location-row">
                <input id="location" name="location" type="text" maxlength="120" placeholder="Airport">
                <button class="inline-button" id="use-location-button" type="button">Use GPS</button>
              </div>
            </label>

            <label class="field field-wide native-row native-select-row">
              <span>Aircraft</span>
              <select id="aircraft" name="aircraft"></select>
            </label>

            <div class="native-add-row">
              <input id="new-aircraft" type="text" maxlength="40" placeholder="Add aircraft">
              <button id="add-aircraft-button" type="button">Add</button>
            </div>

            <label class="field field-wide native-row native-notes-row">
              <span class="visually-hidden">Notes</span>
              <textarea id="notes" name="notes" rows="3" maxlength="400" placeholder="Notes"></textarea>
            </label>

            <label class="field status-date-field" id="submitted-date-field" hidden>
              <span>Date submitted</span>
              <input id="submitted-date" name="submittedDate" type="date">
            </label>

            <label class="field status-date-field" id="paid-date-field" hidden>
              <span>Date paid</span>
              <input id="reimbursed-date" name="reimbursedDate" type="date">
            </label>
          </div>
        </details>
    </form>
  </div>

  <div class="image-modal" id="image-modal" hidden>
    <div class="image-modal-scrim" id="image-modal-scrim"></div>
    <div class="image-modal-card">
      <div class="image-modal-toolbar">
        <button class="inline-button" id="close-preview-button" type="button">Done</button>
        <div class="image-zoom-actions">
          <button class="inline-button" id="zoom-out-button" type="button">-</button>
          <button class="inline-button" id="zoom-reset-button" type="button">Reset</button>
          <button class="inline-button" id="zoom-in-button" type="button">+</button>
        </div>
      </div>
      <div class="image-modal-frame" id="image-modal-frame">
        <img id="image-modal-image" alt="Large receipt preview">
      </div>
      <p class="field-help image-modal-help">Zoom in, then drag to inspect the handwriting and totals.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@7.0.0/dist/tesseract.min.js"></script>
  <script src="expense.js" type="module"></script>
</body>
</html>
